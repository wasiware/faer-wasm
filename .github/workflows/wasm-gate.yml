name: wasm gate

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  wasm-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read upstream pins
        id: pins
        run: |
          echo "faer=$(grep -oE '[0-9a-f]{40}' patches/UPSTREAM-BASE.txt | sed -n 1p)" >> "$GITHUB_OUTPUT"
          echo "pulp=$(grep -oE '[0-9a-f]{40}' patches/UPSTREAM-BASE.txt | sed -n 2p)" >> "$GITHUB_OUTPUT"

      - name: Clone upstreams at the pinned commits
        run: |
          set -eux
          clone_pinned () {
            git init -q "$1"
            git -C "$1" remote add origin "https://github.com/sarah-quinones/$1"
            git -C "$1" fetch --depth 1 -q origin "$2"
            git -C "$1" checkout -q FETCH_HEAD
          }
          clone_pinned faer-rs "${{ steps.pins.outputs.faer }}"
          clone_pinned pulp    "${{ steps.pins.outputs.pulp }}"

      - name: Apply carried patches
        run: |
          set -eux
          for p in patches/*.patch; do
            git -C faer-rs apply "../$p"
          done
          git -C faer-rs diff --stat

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            smoke-test
            bench

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build all four variants
        working-directory: smoke-test
        run: |
          set -eux
          W=target/wasm32-unknown-unknown/release/consumer.wasm
          cargo build --target wasm32-unknown-unknown --release
          cp "$W" matmul.wasm
          cargo build --target wasm32-unknown-unknown --release --features lu
          cp "$W" lu.wasm
          cargo build --target wasm32-unknown-unknown --release --features full
          cp "$W" full.wasm
          RUSTFLAGS='-C target-feature=+simd128,+relaxed-simd' \
            cargo build --target wasm32-unknown-unknown --release --features full
          cp "$W" full-relaxed.wasm

      - name: Check hand-verified values (exact) and size budgets
        working-directory: smoke-test
        run: |
          set -eux
          for v in matmul lu full full-relaxed; do
            node check.mjs "$v.wasm" "$v"
          done

      - name: Cross-target determinism (native vs wasm, bit-for-bit)
        working-directory: smoke-test
        run: |
          set -eux
          cargo run --release --features full --bin native > native-bits.txt
          node determinism.mjs full.wasm native-bits.txt
          node determinism.mjs full-relaxed.wasm native-bits.txt

      - name: Bench harness stays buildable (build + smoke, no timing)
        working-directory: bench
        run: |
          set -eux
          cargo build --lib --profile release-z --target wasm32-unknown-unknown
          node bench.mjs target/wasm32-unknown-unknown/release-z/bench_harness.wasm smoke --smoke
